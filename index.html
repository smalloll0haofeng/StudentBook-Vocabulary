<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>翰林114三下國語第4、5課語詞與生字隨機產生器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(-45deg, #f0f8ff, #ffe4e1, #e6e6fa, #fafad2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
        }
        @keyframes gradientBG {
            0% {background-position:0% 50%}
            50% {background-position:100% 50%}
            100% {background-position:0% 50%}
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            transition: all 0.2s;
            background-color: #ff8c00;
            color: white;
            font-weight: bold;
        }
        button:hover {
            background-color: #ffa500;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
            background-color: #ff7f50;
        }
        #output {
            font-size: 36px;
            color: #ff4500;
            margin: 20px 0;
            min-height: 60px;
            word-break: break-word;
            transition: opacity 0.3s;
        }
        #listWords, #listMyWords {
            margin-top: 20px;
            font-size: 18px;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .button-row {
            display: inline-flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 暴雷文字 CSS */
        .spoiler {
            background-color: #2f3136;
            color: #999;          /* 灰灰文字「答案」 */
            border-radius: 6px;
            padding: 4px 10px;
            margin-left: 10px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }
        .spoiler.reveal {
            background-color: transparent;
            color: #ff4500;       /* 點開變中文紅色 */
        }
    </style>
</head>
<body>

<h1>翰林114三下國語第4、5課語詞與生字隨機產生器</h1>

<button onclick="setMode('repeat')">🔁 可重複模式 🔁</button>
<button onclick="setMode('norepeat')">🚫 不重複模式 🚫</button>

<br><br>
<button onclick="resetAll()">🧹 清空並重新開始 🧹</button>

<br><br>
<div class="button-row">
    <button onclick="generateWord()">抽一個語詞</button>
    <button onclick="generateMyWord()">抽一個生字</button>
</div>

<div id="output">⬆ 點上面開始 ⬆</div>
<div id="listWords">已抽過的語詞：尚未開始</div>
<div id="listMyWords">已抽過的生字：尚未開始</div>

<script>
    const words = [
"ㄍㄨㄤˇ大",
"ㄙㄨㄥ樹",
"ㄋㄧˇ好",
"ㄖㄢˇ色",
"ㄇㄟˋ力",
"ㄕˋ場",
"ㄧㄥˋ照",
"ㄩㄝˋ起",
"ㄇㄤˊ果",
"ㄇㄨˋ色",
"ㄒㄧㄤˊ和",
"ㄧㄠˋ眼",
"ㄐㄧㄣ屬",
"ㄊㄞˋ山",
"ㄧㄣˊ行",
"ㄔㄚ葉",
"ㄒㄧㄤ味",
"ㄔㄥˊ市",
"ㄘㄢ參",
"ㄨ鴉",
"ㄌㄨㄥˊ眼",
"ㄔㄥˊ度",
"ㄈㄨˋ導",
"ㄓㄞ採",
"ㄕㄞˋ乾",
"ㄐㄧㄠˋ母",
"ㄍㄢ乾",
"ㄗㄠˋ熱",
"ㄊㄢˋ氣",
"ㄧㄢˋ證"
    ];

    const myWords = [
"廣",
"松",
"妳",
"染",
"媚",
"市",
"映",
"躍",
"芒",
"暮",
"祥",
"耀",
"金",
"泰",
"銀",
"茶",
"香",
"城",
"參",
"烏",
"龍",
"程",
"傅",
"摘",
"晒",
"酵",
"乾",
"燥",
"嘆",
"驗"
    ];

    let mode = "repeat";
    let remainingWords = [...words];
    let usedWords = [];
    let remainingMyWords = [...myWords];
    let usedMyWords = [];

    // 注音字詞對應中文暴雷
    const wordSpoilers = {
"ㄍㄨㄤˇ大":"廣",
"ㄙㄨㄥ樹":"松",
"ㄋㄧˇ好":"妳",
"ㄖㄢˇ色":"染",
"ㄇㄟˋ力":"媚",
"ㄕˋ場":"市",
"ㄧㄥˋ照":"映",
"ㄩㄝˋ起":"躍",
"ㄇㄤˊ果":"芒",
"ㄇㄨˋ色":"暮",
"ㄒㄧㄤˊ和":"祥",
"ㄧㄠˋ眼":"耀",
"ㄐㄧㄣ屬":"金",
"ㄊㄞˋ山":"泰",
"ㄧㄣˊ行":"銀",
"ㄔㄚ葉":"茶",
"ㄒㄧㄤ味":"香",
"ㄔㄥˊ市":"城",
"ㄘㄢ參":"參",
"ㄨ鴉":"烏",
"ㄌㄨㄥˊ眼":"龍",
"ㄔㄥˊ度":"程",
"ㄈㄨˋ導":"傅",
"ㄓㄞ採":"摘",
"ㄕㄞˋ乾":"晒",
"ㄐㄧㄠˋ母":"酵",
"ㄍㄢ乾":"乾",
"ㄗㄠˋ熱":"燥",
"ㄊㄢˋ氣":"嘆",
"ㄧㄢˋ證":"驗"
    };

    function setMode(newMode) {
        mode = newMode;
        resetAll();
        document.getElementById("output").innerText = "已切換模式：" + (mode === "repeat" ? "可重複" : "不重複");
    }

    function resetAll() {
        remainingWords = [...words];
        usedWords = [];
        remainingMyWords = [...myWords];
        usedMyWords = [];
        document.getElementById("output").innerText = "⬆ 點上面開始 ⬆";
        document.getElementById("listWords").innerText = "已抽過的語詞：尚未開始";
        document.getElementById("listMyWords").innerText = "已抽過的生字：尚未開始";
    }

    function showOutput(word) {
        const output = document.getElementById("output");
        output.style.opacity = 0;
        setTimeout(() => {
            const spoiler = wordSpoilers[word];
            if (spoiler) {
                // 灰灰「答案」初始顯示
                output.innerHTML = `${word}<span class="spoiler" onclick="toggleSpoiler(this)" data-text="${spoiler}">答案</span>`;
            } else {
                output.innerText = word;
            }
            output.style.opacity = 1;
        }, 100);
    }

    function toggleSpoiler(el) {
        const content = el.getAttribute("data-text");
        if (el.classList.contains("reveal")) {
            el.classList.remove("reveal");
            el.innerText = "答案";    // 點回去又變灰灰「答案」
        } else {
            el.classList.add("reveal");
            el.innerText = content;  // 點開顯示中文
        }
    }

    function generateWord() {
        let word;
        if (mode === "repeat") {
            word = words[Math.floor(Math.random() * words.length)];
            if (!usedWords.includes(word)) usedWords.push(word);
        } else {
            if (remainingWords.length === 0) {
                alert("不重複模式已全部抽完！");
                return;
            }
            const i = Math.floor(Math.random() * remainingWords.length);
            word = remainingWords.splice(i, 1)[0];
            usedWords.push(word);
        }
        showOutput(word);
        document.getElementById("listWords").innerText = "已抽過的語詞：" + (usedWords.length ? usedWords.join("、") : "尚未開始");
    }

    function generateMyWord() {
        let word;
        if (mode === "repeat") {
            word = myWords[Math.floor(Math.random() * myWords.length)];
            if (!usedMyWords.includes(word)) usedMyWords.push(word);
        } else {
            if (remainingMyWords.length === 0) {
                alert("生字已全部抽完！");
                return;
            }
            const i = Math.floor(Math.random() * remainingMyWords.length);
            word = remainingMyWords.splice(i, 1)[0];
            usedMyWords.push(word);
        }
        showOutput(word);
        document.getElementById("listMyWords").innerText = "已抽過的生字：" + (usedMyWords.length ? usedMyWords.join("、") : "尚未開始");
    }
</script>

</body>
</html>
